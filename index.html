    <script>
      (function (l) {
        if (l.search[1] !== "/") return;
        var decoded = l.search
          .slice(1)
          .replace(/~and~/g, "&")
          .replace(/^\/\?/, "");
        window.history.replaceState(
          null,
          "",
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      })(window.location);
    </script>
